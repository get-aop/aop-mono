name: AOP E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Test file pattern to run (optional)"
        required: false
        default: ""

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run E2E tests
        run: |
          if [ -n "${{ inputs.test_filter }}" ]; then
            bun test e2e-tests --test-name-pattern "${{ inputs.test_filter }}"
          else
            bun run test:e2e
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

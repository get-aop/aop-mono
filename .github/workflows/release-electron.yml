name: Release Electron App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Validate macOS signing secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          missing=()
          for key in APPLE_ID APPLE_ID_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required macOS signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Prepare clean Electron release build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Build local-server binary
        working-directory: aop/apps/local-server
        run: bun run build:sidecar

      - name: Build dashboard
        working-directory: aop/apps/dashboard
        run: bun run build

      - name: Install Electron dependencies
        working-directory: aop/apps/electron
        run: bun install

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: aop/apps/electron/out/make/**

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Prepare clean Electron release build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Build local-server binary (Linux for WSL)
        working-directory: aop/apps/local-server
        run: bun build ./src/run.ts --compile --target=bun-linux-x64 --outfile ./dist/aop-server-linux

      - name: Build dashboard
        working-directory: aop/apps/dashboard
        run: bun run build

      - name: Install Electron dependencies
        working-directory: aop/apps/electron
        run: bun install

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: aop/apps/electron/out/make/**

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Prepare clean Electron release build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Build local-server binary
        working-directory: aop/apps/local-server
        run: bun run build:sidecar

      - name: Build dashboard
        working-directory: aop/apps/dashboard
        run: bun run build

      - name: Install Electron dependencies
        working-directory: aop/apps/electron
        run: bun install

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: aop/apps/electron/out/make/**

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/**
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: AOP CI

on:
  push:
    branches: [main]
    paths:
      - "aop/**"
  pull_request:
    branches: [main]
    paths:
      - "aop/**"

defaults:
  run:
    working-directory: aop

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: aop
          POSTGRES_PASSWORD: aop
          POSTGRES_DB: aop_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 25432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Build Electron app
        run: bun run --filter @aop/electron build

      - name: Prepare environment
        run: cp .env.example .env

      - name: Test with Coverage
        run: bun run test:coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: aop-coverage-report
          path: aop/coverage/
          retention-days: 30

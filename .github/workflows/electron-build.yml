name: Build & Release Electron Apps

on:
  push:
    branches: [feat/electron-app]
    paths:
      - ".github/workflows/electron-build.yml"
      - "aop/apps/electron/**"
      - "aop/apps/dashboard/**"
      - "aop/apps/local-server/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build from"
        required: true
        default: "main"
        type: string
      version:
        description: "Version tag (e.g., 0.1.0)"
        required: true
        type: string
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - macos
          - linux
          - windows

jobs:
  build-macos:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos'
    runs-on: macos-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Prepare clean Electron build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: aop/apps/electron/out/make/*.dmg
          retention-days: 1

  build-linux:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y icnsutils graphicsmagick

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Prepare clean Electron build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make

      - name: Normalize Linux artifact filename
        working-directory: aop/apps/electron
        run: |
          deb_file="$(find out/make/deb -name "*.deb" -print -quit)"
          if [ -z "${deb_file}" ]; then
            echo "No .deb artifact found"
            exit 1
          fi

          deb_dir="$(dirname "${deb_file}")"
          deb_arch="$(basename "${deb_file}" | sed -E 's/^.*_([^_]+)\.deb$/\1/')"
          if [ -z "${deb_arch}" ]; then
            echo "Failed to detect Debian package architecture from ${deb_file}"
            exit 1
          fi

          normalized_file="${deb_dir}/aop_${deb_arch}.deb"
          mv "${deb_file}" "${normalized_file}"
          echo "Normalized Linux artifact: ${normalized_file}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: aop/apps/electron/out/make/deb/**/*.deb
          retention-days: 1

  build-linux-sidecar:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Build Linux sidecar for WSL
        working-directory: aop/apps/electron
        run: bun run build:sidecar-linux

      - name: Upload Linux sidecar
        uses: actions/upload-artifact@v4
        with:
          name: linux-sidecar
          path: aop/apps/local-server/dist/aop-server-linux
          retention-days: 1

  build-windows:
    if: github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows'
    needs: [build-linux-sidecar]
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
      ELECTRON_CACHE: ${{ github.workspace }}/.tmp/electron-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.tmp/electron-builder-cache-${{ github.job }}-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: aop
        run: bun install

      - name: Prepare clean Electron build
        working-directory: aop
        run: bun run ./scripts/release/prepare-electron-build.ts

      - name: Download Linux sidecar
        uses: actions/download-artifact@v4
        with:
          name: linux-sidecar
          path: aop/apps/local-server/dist

      - name: Build dashboard
        working-directory: aop/apps/electron
        run: bun run build:dashboard

      - name: Build Electron app
        working-directory: aop/apps/electron
        run: bun run make

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: aop/apps/electron/out/make/**/*.exe
          retention-days: 1

  release:
    if: github.event_name == 'workflow_dispatch' && (github.event.inputs.platform == 'all' || github.event.inputs.platform == '')
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find artifacts -name "*.exe" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ github.event.inputs.version }}" -m "Release v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: AOP Desktop v${{ github.event.inputs.version }}
          body: |
            ## AOP Desktop v${{ github.event.inputs.version }}

            ### Downloads
            - **macOS**: `AOP Desktop.dmg`
            - **Linux (Debian/Ubuntu)**: `aop_<arch>.deb`
            - **Windows**: `AOP-Setup.exe`
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

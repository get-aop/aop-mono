services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ~/.claude-agi:/root/.claude-agi
      - ~/.aop:/root/.aop
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount user's home directory so orchestrator can access project paths
      - ${HOME}:${HOME}
    environment:
      - DASHBOARD_PORT=3001
      - MAX_CONCURRENT_AGENTS=2
      - DEBOUNCE_MS=100
      - RETRY_INITIAL_MS=2000
      - RETRY_MAX_MS=300000
      - RETRY_MAX_ATTEMPTS=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/state"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

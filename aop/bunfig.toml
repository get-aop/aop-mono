[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# Ignore migrations, test utilities, and e2e test helpers from coverage
coveragePathIgnorePatterns = [
  "**/migrations/**",
  "**/test-utils.ts",
  "**/test-setup.ts",
  "**/e2e-tests/**",
  # We have code for Mac and Linux and its not possible to achieve coverage in CI
  # TODO: refactor into two files (linxu and macos), and ignore only macos
  "**/process-utils.ts",
  "**/*.integration.test.ts",
  # React components with hooks require DOM testing environment (happy-dom/jsdom)
  # TODO: Set up proper React component testing infrastructure
  "**/DirectoryBrowserDialog.tsx"
]

# Coverage threshold as a regression floor - TDD naturally exceeds this.
# Real quality enforcement comes from diff coverage on PRs, not global numbers.
coverageThreshold = { lines = 0.7, functions = 0 }

[test]
coverageReporter = ["text", "lcov"]
coverageDir = "coverage"
coverageSkipTestFiles = true

# Ignore migrations, test utilities, and e2e test helpers from coverage
coveragePathIgnorePatterns = [
  "**/migrations/**",
  "**/test-utils.ts",
  "**/test-setup.ts",
  "**/openspec/**",
  "**/e2e-tests/**"
]

# Coverage thresholds (0.0-1.0) - CI will fail if coverage drops below these
coverageThreshold = { lines = 0.8, functions = 0.8 }

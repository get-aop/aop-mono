name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: aop
          POSTGRES_PASSWORD: aop
          POSTGRES_DB: aop
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U aop -d aop"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://aop:aop@localhost:5433/aop_test
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Create test database
        run: PGPASSWORD=aop psql -h localhost -p 5433 -U aop -d aop -c "CREATE DATABASE aop_test;"

      - name: Create test env file
        run: echo "TEST_DATABASE_URL=$TEST_DATABASE_URL" > .env.test

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

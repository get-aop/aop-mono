pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,tsx,jsx,json,jsonc}"
      exclude: "(\.webpack/|\.next/|dist/|build/)"
      run: bun check
      stage_fixed: true

pre-push:
  commands:
    coverage:
      run: bun run test:coverage
      skip:
        - merge
        - rebase

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "**/*.{js,ts,tsx,jsx,json,jsonc}"
      exclude: "(node_modules/|coverage/|tmp/|\\.webpack/|\\.next/|dist/|build/|out/)"
      run: bunx @biomejs/biome check --write --staged --no-errors-on-unmatched {staged_files}
      stage_fixed: true

pre-push:
  commands:
    coverage:
      run: bun run test:coverage
      skip:
        - merge
        - rebase

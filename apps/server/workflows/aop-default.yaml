version: 1
name: aop-default
initialStep: iterate
steps:
  iterate:
    id: iterate
    type: iterate
    promptTemplate: implement.md.hbs
    maxAttempts: 1
    signals:
      - name: CHUNK_DONE
        description: completed a chunk, more tasks remain
      - name: ALL_TASKS_DONE
        description: all implementation tasks are complete
    transitions:
      - condition: CHUNK_DONE
        target: iterate
      - condition: __none__
        target: iterate
      - condition: ALL_TASKS_DONE
        target: full-review
      - condition: failure
        target: __blocked__

  full-review:
    id: full-review
    type: review
    promptTemplate: full-review.md.hbs
    maxAttempts: 1
    signals:
      - name: REVIEW_PASSED
        description: all checks pass, no issues found
      - name: REVIEW_FAILED
        description: issues found that need fixing
    transitions:
      - condition: REVIEW_PASSED
        target: __done__
      - condition: REVIEW_FAILED
        target: fix-issues
        maxIterations: 2
        onMaxIterations: __blocked__
      - condition: failure
        target: __blocked__

  fix-issues:
    id: fix-issues
    type: implement
    promptTemplate: fix-issues.md.hbs
    maxAttempts: 1
    signals:
      - name: FIX_COMPLETE
        description: all review issues have been addressed
    transitions:
      - condition: FIX_COMPLETE
        target: quick-review
        afterIteration: 1
        thenTarget: full-review
      - condition: failure
        target: __blocked__

  quick-review:
    id: quick-review
    type: review
    promptTemplate: quick-review.md.hbs
    maxAttempts: 1
    signals:
      - name: REVIEW_PASSED
        description: fixes verified, all checks pass
      - name: REVIEW_FAILED
        description: issues remain or new issues found
    transitions:
      - condition: REVIEW_PASSED
        target: __done__
      - condition: REVIEW_FAILED
        target: fix-issues
      - condition: failure
        target: __blocked__
terminalStates:
  - __done__
  - __blocked__

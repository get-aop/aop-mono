<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    />
    <title>AOP Desktop</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", sans-serif;
        background: #0a0a0b;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .titlebar {
        height: 40px;
        background: #18181b;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        -webkit-app-region: drag;
        user-select: none;
      }

      .titlebar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .titlebar-icon {
        width: 20px;
        height: 20px;
      }

      .titlebar-text {
        color: white;
        font-size: 13px;
        font-weight: 500;
        opacity: 0.9;
      }

      /* Windows/Linux: icon-style window controls */
      .titlebar-controls {
        display: flex;
        -webkit-app-region: no-drag;
      }

      /* macOS: hide custom controls (native traffic lights via titleBarStyle: "hidden") */
      .is-macos .titlebar-controls {
        display: none;
      }

      .is-macos .titlebar {
        padding-left: 78px;
      }

      /* .titlebar-controls {
            display: flex;
            -webkit-app-region: no-drag;
          } */

      .titlebar-btn {
        width: 46px;
        height: 40px;
        border: none;
        cursor: pointer;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }

      .titlebar-btn svg {
        width: 16px;
        height: 16px;
        stroke: rgba(255, 255, 255, 0.7);
        stroke-width: 1.5;
        fill: none;
        transition: stroke 0.15s ease;
      }

      .titlebar-btn:hover svg {
        stroke: white;
      }

      .btn-minimize:hover {
        background: #27272a;
      }

      .btn-maximize:hover {
        background: #27272a;
      }

      .btn-close:hover {
        background: #dc2626;
      }

      .btn-close:hover svg {
        stroke: white;
      }

      .content {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      .container {
        text-align: center;
        color: white;
      }

      .logo {
        width: 80px;
        height: 80px;
        background: #27272a;
        border-radius: 8px;
        border: 1px solid #3f3f46;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 24px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        animation: float 3s ease-in-out infinite;
      }

      .logo svg {
        width: 48px;
        height: 48px;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      h1 {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
      }

      p {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 32px;
      }

      .spinner-container {
        position: relative;
        width: 60px;
        height: 60px;
        margin: 0 auto;
      }

      .spinner {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      .spinner-inner {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        bottom: 10px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-bottom-color: white;
        border-radius: 50%;
        animation: spin 1.5s linear infinite reverse;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .status {
        margin-top: 24px;
        font-size: 13px;
        opacity: 0.7;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.7;
        }

        50% {
          opacity: 0.4;
        }
      }

      .particles {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: 6px;
        height: 6px;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        animation: rise 15s infinite;
      }

      .particle:nth-child(1) {
        left: 10%;
        animation-delay: 0s;
      }

      .particle:nth-child(2) {
        left: 30%;
        animation-delay: 2s;
      }

      .particle:nth-child(3) {
        left: 50%;
        animation-delay: 4s;
      }

      .particle:nth-child(4) {
        left: 70%;
        animation-delay: 6s;
      }

      .particle:nth-child(5) {
        left: 90%;
        animation-delay: 8s;
      }

      @keyframes rise {
        0% {
          bottom: -10px;
          opacity: 0;
        }

        10% {
          opacity: 1;
        }

        90% {
          opacity: 1;
        }

        100% {
          bottom: 100%;
          opacity: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="titlebar">
      <div class="titlebar-left">
        <svg
          class="titlebar-icon"
          viewBox="0 0 24 24"
          fill="white"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="white" />
          <path
            d="M2 17L12 22L22 17"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M2 12L12 17L22 12"
            stroke="white"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span class="titlebar-text">AOP Desktop</span>
      </div>
      <div class="titlebar-controls">
        <button
          class="titlebar-btn btn-minimize"
          onclick="window.electronAPI.minimizeWindow()"
        >
          <svg viewBox="0 0 16 16">
            <path
              d="M4 8h8"
              stroke="rgba(255,255,255,0.7)"
              stroke-width="1.5"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
        </button>
        <button
          class="titlebar-btn btn-maximize"
          onclick="window.electronAPI.maximizeWindow()"
        >
          <svg viewBox="0 0 16 16">
            <rect
              x="3.5"
              y="3.5"
              width="9"
              height="9"
              rx="1.5"
              stroke="rgba(255,255,255,0.7)"
              stroke-width="1.5"
              fill="none"
            />
          </svg>
        </button>
        <button
          class="titlebar-btn btn-close"
          onclick="window.electronAPI.closeWindow()"
        >
          <svg viewBox="0 0 16 16">
            <path
              d="M4 4l8 8M12 4l-8 8"
              stroke="rgba(255,255,255,0.7)"
              stroke-width="1.5"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
        </button>
      </div>
    </div>

    <div class="content">
      <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      </div>

      <div class="container">
        <div class="logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="#d97706" />
            <path
              d="M2 17L12 22L22 17"
              stroke="#d97706"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path
              d="M2 12L12 17L22 12"
              stroke="#d97706"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <h1>AOP Desktop</h1>
        <p>Agents Operating Platform</p>
        <div class="spinner-container">
          <div class="spinner"></div>
          <div class="spinner-inner"></div>
        </div>
        <p class="status">Starting AOP Server...</p>
      </div>
    </div>
    <script>
      if (navigator.platform.startsWith("Mac")) {
        document.body.classList.add("is-macos");
      }

      // Listen for status updates from main process
      if (window.electronAPI?.onStatusUpdate) {
        window.electronAPI.onStatusUpdate((status) => {
          const statusElement = document.querySelector(".status");
          if (statusElement) {
            statusElement.textContent = status;
          }
        });
      }

      // Listen for server errors
      if (window.electronAPI?.onServerError) {
        window.electronAPI.onServerError((error) => {
          const statusElement = document.querySelector(".status");
          if (statusElement) {
            statusElement.textContent = `Error: ${error}`;
            statusElement.style.color = "#ff6b6b";
          }
        });
      }

      // Open DevTools on Ctrl+Shift+I or F12 for debugging
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey && e.shiftKey && e.key === "I") || e.key === "F12") {
          // DevTools shortcut pressed
        }
      });
    </script>
  </body>
</html>

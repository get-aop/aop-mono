services:
  postgres:
    image: postgres:17-alpine
    container_name: aop-postgres
    environment:
      POSTGRES_USER: aop
      POSTGRES_PASSWORD: aop
      POSTGRES_DB: aop
    ports:
      - "25432:5432"
    volumes:
      - aop_postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aop -d aop"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: aop-server
    environment:
      AOP_DATABASE_URL: postgresql://aop:aop@postgres:5432/aop
      AOP_SERVER_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  aop_postgres_data:

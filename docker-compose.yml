# Dev: postgres only. For full stack (postgres + server), use docker-compose.prod.yml
services:
  postgres:
    image: postgres:17-alpine
    container_name: aop-postgres
    environment:
      POSTGRES_USER: aop
      POSTGRES_PASSWORD: aop
      POSTGRES_DB: aop
    ports:
      - "25432:5432"
    volumes:
      - aop_postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aop -d aop"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  aop_postgres_data:
